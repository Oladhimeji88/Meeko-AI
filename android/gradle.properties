org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dhttps.protocols=TLSv1.2,TLSv1.3 -Djdk.tls.client.protocols=TLSv1.2 -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000 -Dorg.gradle.internal.repository.max.retries=10 -Dorg.gradle.internal.repository.initial.backoff=1000
android.useAndroidX=true

# Network resilience for unstable / TLS-inspected connections.
# Serialize downloads (no parallel) to reduce TLS handshake corruption.
org.gradle.parallel=false
org.gradle.daemon=true

