name: pixelbuddy_clock
description: "PixelBuddy Clock — a pixel-art smart clock companion with weather, alarms, timers, and an AI buddy."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Networking
  dio: ^5.7.0

  # Notifications & alarms
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Device features
  vibration: ^2.0.0
  geolocator: ^13.0.2
  wakelock_plus: ^1.2.8

  # AI voice
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # UI helpers
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
